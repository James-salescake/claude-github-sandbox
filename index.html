<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Claude GitHub Sandbox</title>
  <style>
    :root { --bg:#0b0d10; --fg:#e7e9ee; --accent:#ff8a3d; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--fg);
           font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
           display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:640px; width:100%; padding:32px; border:1px solid #1f242b;
            border-radius:14px; background:#11151b; }
    h1 { margin:0 0 8px; font-size:28px; }
    p  { margin:0 0 20px; color:#aab1bd; }
    .links { display:flex; gap:12px; flex-wrap:wrap; }
    a { color:var(--fg); background:#1a2029; padding:10px 14px; border-radius:8px;
        text-decoration:none; border:1px solid #232a34; }
    a:hover { border-color:var(--accent); color:var(--accent); }
    .bug-row { margin-top:18px; padding-top:18px; border-top:1px dashed #232a34; }
    .migration-footer { margin-top:18px; padding-top:12px; border-top:1px solid #232a34;
                        font-size:12px; color:#7c8493; text-align:center; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Claude GitHub Sandbox</h1>
    <p>Tag <code>@claude</code> on an issue and watch a PR show up.</p>

    <div class="links">
      <a href="https://x.com/wronglink" target="_blank" rel="noopener">X</a>
      <a href="https://www.linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://www.youtube.com" target="_blank" rel="noopener">YouTube</a>
    </div>

    <div class="bug-row">
      <button id="cta" style="position:relative; left:60%;">Buy now</button>
    </div>

    <footer class="migration-footer">Migration verified — 2026-05-07</footer>
  </main>
</body>
</html>
